<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ملفك الخاص -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- 🔹 العنوان -->
    <div class="container text-center my-4">
        <h1 class="fw-bold">Room Inventory</h1>
    </div>

    <!-- 🔹 الفورم -->
    <div class="container mb-4">
        <form class="row g-3 bg-white p-4 rounded shadow">

            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Room Number" required>
            </div>

            <div class="col-md-4">
                <input type="number" class="form-control" placeholder="Capacity" required>
            </div>

            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Equipment (Projector, PC)">
            </div>

            <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary">Add Room</button>
            </div>

        </form>
    </div>

    <!-- 🔹 الكروت -->
    <div class="container">
        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">A101</h5>
                        <p class="card-text">Capacity: 30</p>

                        <span class="badge bg-primary">Projector</span>

                        <div class="mt-3 d-flex justify-content-between">
                            <button class="btn btn-success btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">B202</h5>
                        <p class="card-text">Capacity: 50</p>

                        <span class="badge bg-primary">PC</span>
                        <span class="badge bg-secondary">AC</span>

                        <div class="mt-3 d-flex justify-content-between">
                            <button class="btn btn-success btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">C303</h5>
                        <p class="card-text">Capacity: 100</p>

                        <span class="badge bg-primary">Projector</span>
                        <span class="badge bg-warning text-dark">Sound System</span>

                        <div class="mt-3 d-flex justify-content-between">
                            <button class="btn btn-success btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

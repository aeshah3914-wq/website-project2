<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Management</title>

    <!-- مهم للـ Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">University System</a>

    <!-- زر الموبايل -->
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- القائمة -->
    <div class="collapse navbar-collapse" id="menu">
      <div class="ms-auto">
        <a class="nav-link text-white" href="index.html">Register</a>
        <a class="nav-link text-white" href="students.html">Students</a>
        <a class="nav-link text-white" href="events.html">Events</a>
        <a class="nav-link text-white" href="rooms.html">Rooms</a>
        <a class="nav-link text-white" href="clubs.html">Clubs</a>
        <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
        <a class="nav-link text-white" href="layout.html">Layout</a>
      </div>
    </div>
  </div>
</nav>

<!-- Title -->
<div class="container text-center my-4">
    <h1 class="fw-bold">Room Inventory</h1>
</div>

<!-- Form -->
<div class="container mb-4">
    <form class="row g-3 bg-white p-4 rounded shadow">

        <div class="col-12 col-md-4">
            <input type="text" class="form-control" placeholder="Room Number" required>
        </div>

        <div class="col-12 col-md-4">
            <input type="number" class="form-control" placeholder="Capacity" required>
        </div>

        <div class="col-12 col-md-4">
            <input type="text" class="form-control" placeholder="Equipment (Projector, PC)">
        </div>

        <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary">Add Room</button>
        </div>

    </form>
</div>

<!-- Cards -->
<div class="container">
    <div class="row g-4">

        <div class="col-12 col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">A101</h5>
                    <p class="card-text">Capacity: 30</p>
                    <span class="badge bg-primary">Projector</span>

                    <div class="mt-3 d-flex justify-content-between">
                        <button class="btn btn-success btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">B202</h5>
                    <p class="card-text">Capacity: 50</p>

                    <span class="badge bg-primary">PC</span>
                    <span class="badge bg-secondary">AC</span>

                    <div class="mt-3 d-flex justify-content-between">
                        <button class="btn btn-success btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">C303</h5>
                    <p class="card-text">Capacity: 100</p>

                    <span class="badge bg-primary">Projector</span>
                    <span class="badge bg-warning text-dark">Sound System</span>

                    <div class="mt-3 d-flex justify-content-between">
                        <button class="btn btn-success btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">University System</a>

    <div>
      <a class="nav-link text-white" href="index.html">Register</a>
      <a class="nav-link text-white" href="students.html">Students</a>
      <a class="nav-link text-white" href="events.html">Events</a>
      <a class="nav-link text-white" href="room.html">Rooms</a>
      <a class="nav-link text-white" href="clubs.html">Clubs</a>
      <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
      <a class="nav-link text-white" href="layout.html">Layout</a>
    </div>
  </div>
</nav>

<!-- Event Form -->
<div class="container mt-5">
  <div class="card p-4 mb-4">
    <h3>Create Event</h3>

    <form>
      <input class="form-control mb-2" placeholder="Event Title" required>
      <textarea class="form-control mb-2" placeholder="Description" required></textarea>
      <input type="date" class="form-control mb-2" required>

      <select class="form-select mb-2">
        <option>Workshop</option>
        <option>Seminar</option>
      </select>

      <button class="btn btn-success">Create</button>
    </form>
  </div>

  <!-- Event Gallery -->
  <h3 class="mb-3">Upcoming Events</h3>

  <div class="row">

    <!-- Event 1 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body">
          <h5 class="card-title">Web Workshop</h5>
          <p class="card-text">Learn HTML & CSS</p>

          <span class="badge bg-primary">Open</span>

          <br><br>
          <button class="btn btn-primary">Register</button>
        </div>
      </div>
    </div>

    <!-- Event 2 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body">
          <h5 class="card-title">AI Seminar</h5>
          <p class="card-text">Introduction to AI</p>

          <span class="badge bg-danger">Full</span>

          <br><br>
          <button class="btn btn-secondary">Closed</button>
        </div>
      </div>
    </div>

    <link rel="stylesheet" href="style.css">

    <!-- Event 3 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body">
          <h5 class="card-title">Coding Competition</h5>
          <p class="card-text">اختبر مهاراتك البرمجية</p>

          <span class="badge bg-primary">Open</span>

          <br><br>
          <button class="btn btn-primary">Register</button>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
